<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Laundry FIFO</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-5">

    <h1 class="text-center text-primary mb-4">
        🧺 SISTEM LAUNDRY FIFO
    </h1>

    <div class="row">

        <!-- FORM -->
        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">
                    Tambah Transaksi
                </div>

                <div class="card-body">

                    <div class="mb-3">
                        <label>Nama Pelanggan</label>
                        <input
                            type="text"
                            id="nama"
                            class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>No HP</label>
                        <input
                            type="text"
                            id="hp"
                            class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Berat Cucian (Kg)</label>
                        <input
                            type="number"
                            id="berat"
                            class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Jenis Layanan</label>

                        <select id="layanan" class="form-select">

                            <option value="7000">
                                Cuci Kering - Rp7.000/Kg
                            </option>

                            <option value="9000">
                                Cuci + Setrika - Rp9.000/Kg
                            </option>

                            <option value="12000">
                                Express - Rp12.000/Kg
                            </option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label>Metode Pembayaran</label>

                        <select
                            id="metode"
                            class="form-select">

                            <option>Tunai</option>
                            <option>QRIS</option>

                        </select>

                    </div>

                    <button
                        class="btn btn-success w-100"
                        onclick="tambahAntrean()">

                        Tambah Antrean

                    </button>

                </div>

            </div>

        </div>

        <!-- ANTREAN -->
        <div class="col-md-7">

            <div class="card shadow">

                <div class="card-header bg-success text-white">

                    Daftar Antrean (FIFO)

                </div>

                <div class="card-body">

                    <table class="table table-bordered">

                        <thead>

                        <tr>

                            <th>No</th>
                            <th>Nama</th>
                            <th>Berat</th>
                            <th>Layanan</th>

                        </tr>

                        </thead>

                        <tbody id="daftarAntrean">

                            <tr>

                                <td colspan="4" align="center">

                                    Belum Ada Antrean

                                </td>

                            </tr>

                        </tbody>

                    </table>

                    <button
                        class="btn btn-primary"
                        onclick="layaniAntrean()">

                        Layani Pelanggan Berikutnya

                    </button>

                </div>

            </div>

        </div>

    </div>

    <br>

    <!-- STRUK -->

    <div class="card shadow">

        <div class="card-header bg-warning">

            Struk Laundry

        </div>

        <div class="card-body">

            <p><b>No Antrean :</b> <span id="no"></span></p>

            <p><b>Nama :</b> <span id="hasilNama"></span></p>

            <p><b>No HP :</b> <span id="hasilHP"></span></p>

            <p><b>Berat :</b> <span id="hasilBerat"></span></p>

            <p><b>Layanan :</b> <span id="hasilLayanan"></span></p>

            <p><b>Metode :</b> <span id="hasilMetode"></span></p>

            <p><b>Total :</b> <span id="hasilTotal"></span></p>

            <p>

                <b>Status :</b>

                <span
                    id="status"
                    class="badge bg-danger">

                    Belum Dibayar

                </span>

            </p>
            <div id="qrisBox" style="display:none;">

    <center>

        <h4>Scan QRIS</h4>

        <img src="foto.jpg.jpeg" width="250" alt="QRIS">

        <br><br>

        <button class="btn btn-success" onclick="konfirmasiQRIS()">
            Saya Sudah Bayar
        </button>

    </center>

</div>

            <div
                id="qrisBox"
                style="display:none;">

                <center>

                    <h4>

                        Scan QRIS

                    </h4>

                    <img
                        src="foto.jpg.jpeg"
                        width="250">

                    <br><br>

                    <button
                        class="btn btn-success"
                        onclick="konfirmasiQRIS()">

                        Saya Sudah Bayar

                    </button>

                </center>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
